<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Study Chatbot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>Study Chatbot</h1>
      <p>A basic rule-based study helper without an LLM.</p>
    </header>

    <main class="chat-container" id="chatContainer">
      <div class="message bot-message">
        <div class="message-text">Hello! I can help you study. Ask me about math, science, history, or study tips.</div>
      </div>
    </main>

    <form class="chat-form" id="chatForm">
      <input type="text" id="userInput" placeholder="Ask a study question..." autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
